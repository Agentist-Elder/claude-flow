[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short 
    --strict-markers
    --disable-warnings
    --durations=10
    --color=yes

markers =
    unit: Unit tests
    integration: Integration tests  
    e2e: End-to-end tests
    performance: Performance tests
    slow: Slow tests (>1s)
    fast: Fast tests (<100ms)
    auth: Authentication tests
    text_processing: Text processing tests
    database: Database tests
    api: API endpoint tests
    security: Security tests
    concurrency: Concurrency tests
    citation: Citation processing tests
    legal: Legal document processing tests
    mock: Tests using mocks
    real: Tests using real implementations
    external: Tests requiring external services
    memory: Tests using in-memory databases
    file: Tests using file-based databases

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:requests.*
    ignore::UserWarning:urllib3.*

minversion = 6.0