[tool:pytest]
# Pytest configuration for London School TDD test suite
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test discovery patterns
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=90

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints and database operations
    e2e: End-to-end workflow tests
    performance: Performance and benchmarking tests
    auth: Authentication-related tests
    text_processing: Text processing functionality tests
    database: Database operation tests
    api: API endpoint tests
    security: Security-related tests
    slow: Tests that take more than 1 second to run
    fast: Tests that run quickly (under 100ms)

# Test execution options
console_output_style = progress
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*urllib3.*:UserWarning

# Coverage settings
[coverage:run]
source = src
omit = 
    src/*/tests/*
    src/*/test_*
    */tests/*
    */test_*
    setup.py
    venv/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\(Protocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov